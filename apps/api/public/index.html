<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SavdoCRM API</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0f172a;
        color: #e2e8f0;
      }
      .card {
        max-width: 32rem;
        padding: 2rem;
        text-align: center;
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.5rem;
      }
      p {
        margin: 0;
        color: #94a3b8;
      }
      code {
        background: rgba(255, 255, 255, 0.08);
        padding: 0.15em 0.4em;
        border-radius: 4px;
        font-size: 0.95em;
      }
      a {
        color: #93c5fd;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>SavdoCRM API</h1>
      <p>This is the API backend. Use the web app to interact with it.</p>
      <p style="margin-top: 1rem;">
        Health check: <a href="/api/health"><code>GET /api/health</code></a>
      </p>
    </main>
  </body>
</html>
